[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Supabase anon key はクライアント公開用のためスキャン対象外
  SECRETS_SCAN_OMIT_PATHS = "property.html,index.html,netlify/functions/lib/supabase.js,netlify/functions/read-maisoku-background.js"

[functions]
  node_bundler = "esbuild"

[functions."generate"]
  timeout = 60

[functions."generate-property"]
  timeout = 30

[functions."generate-property-background"]
  timeout = 900

[functions."read-maisoku-background"]
  timeout = 900

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
