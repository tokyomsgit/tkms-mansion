<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物件資料</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#1c2b2a;
  --dark2:#243635;
  --green:#7eb8a0;
  --gold:#c8b89a;
  --gold2:#e8d8bc;
  --text:#1a1a1a;
  --gray:#888;
  --light:#f8f7f3;
  --border:#e8e6e0;
  --white:#ffffff;
}
body{background:#fff;font-family:'Noto Serif JP','游明朝',serif;color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}

/* ===== ヘッダー ===== */
#site-header{position:sticky;top:0;z-index:100;background:rgba(28,43,42,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(126,184,160,0.2);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between}
.header-company{font-size:11px;color:var(--green);letter-spacing:0.15em;font-family:'Cormorant Garamond',serif;font-style:italic}
.header-title{font-size:13px;font-weight:600;letter-spacing:0.06em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%}
.header-tel{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:0.06em;text-decoration:none;display:flex;align-items:center;gap:6px}
.header-tel:hover{color:var(--gold2)}

/* ===== ローディング ===== */
#loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--dark)}
.loading-row{display:flex;gap:8px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:ld 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:0.2s}
.loading-dot:nth-child(3){animation-delay:0.4s}
@keyframes ld{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
.loading-text{font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:0.1em}
#error-msg{display:none;min-height:80vh;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--gray);font-size:14px}
#content{display:none}

/* ===== アニメーション ===== */
.fade-in{opacity:0;transform:translateY(28px);transition:opacity 0.8s ease,transform 0.8s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}
.fade-in-delay-1{transition-delay:0.1s}
.fade-in-delay-2{transition-delay:0.2s}
.fade-in-delay-3{transition-delay:0.3s}

/* ===== ヒーロー ===== */
.hero{background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 100%);color:#fff;padding:64px 24px 56px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(126,184,160,0.08) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green) 30%,var(--green) 70%,transparent)}
.hero-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--green);letter-spacing:0.3em;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.hero-eyebrow::before{content:'';width:32px;height:1px;background:var(--green)}
.hero-name{font-size:clamp(30px,6vw,52px);font-weight:600;letter-spacing:0.04em;line-height:1.2;margin-bottom:10px}
.hero-room{font-size:15px;color:var(--green);letter-spacing:0.2em;font-weight:300;margin-bottom:40px}
.hero-price-wrap{margin-bottom:40px}
.hero-price-label{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.15em;margin-bottom:6px}
.hero-price{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,9vw,72px);font-weight:300;color:#fff;letter-spacing:0.02em;line-height:1}
.hero-price-suffix{font-size:clamp(18px,3vw,28px);font-weight:300;margin-left:4px}
.hero-tags{display:flex;flex-wrap:wrap;gap:8px}
.hero-tag-item{background:rgba(126,184,160,0.12);border:1px solid rgba(126,184,160,0.35);border-radius:20px;padding:6px 16px;font-size:12px;color:var(--green);letter-spacing:0.06em}

/* ===== セクション共通 ===== */
.section{padding:56px 24px;max-width:800px;margin:0 auto}
.section-full{padding:0;max-width:100%;margin:0}
.section+.section{border-top:1px solid var(--border)}
.section-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--green);letter-spacing:0.28em;margin-bottom:8px}
.section-title{font-size:22px;font-weight:700;letter-spacing:0.06em;margin-bottom:28px;color:var(--dark)}

/* ===== メインビジュアル ===== */
#visual-section{border-top:none}
.visual-wrap{display:grid;grid-template-columns:2fr 1fr;gap:3px;height:480px}
.visual-main{position:relative;overflow:hidden;background:var(--dark)}
.visual-main img,.visual-sub-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.8s ease}
.visual-main:hover img,.visual-sub-img:hover img{transform:scale(1.03)}
.visual-sub{display:flex;flex-direction:column;gap:3px}
.visual-sub-img{flex:1;position:relative;overflow:hidden;background:var(--dark)}
.visual-label{position:absolute;bottom:10px;left:12px;font-size:10px;color:rgba(255,255,255,0.9);letter-spacing:0.12em;background:rgba(0,0,0,0.4);padding:3px 10px;border-radius:12px;backdrop-filter:blur(4px)}
@media(max-width:640px){
  .visual-wrap{grid-template-columns:1fr;height:auto}
  .visual-main{aspect-ratio:4/3}
  .visual-sub{flex-direction:row;height:140px}
}

/* ===== キャッチコピー（選ぶ理由） ===== */
#reason-section{background:var(--dark);border-top:none}
#reason-section .section{max-width:840px;padding:56px 24px}
.reason-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.reason-card{text-align:center;padding:32px 20px;border:1px solid rgba(126,184,160,0.2);border-radius:12px;background:rgba(255,255,255,0.04);transition:border-color 0.3s,transform 0.3s}
.reason-card:hover{border-color:rgba(126,184,160,0.5);transform:translateY(-4px)}
.reason-icon{margin-bottom:14px;display:flex;justify-content:center}
.reason-icon-badge{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;border:1px solid rgba(126,184,160,0.45);color:var(--green);font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;letter-spacing:0.06em;background:rgba(126,184,160,0.08)}
.reason-label{font-size:11px;color:var(--green);letter-spacing:0.2em;margin-bottom:8px;font-family:'Cormorant Garamond',serif;font-style:italic}
.reason-title{font-size:17px;font-weight:600;color:#fff;letter-spacing:0.04em;margin-bottom:8px}
.reason-desc{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.8}
@media(max-width:640px){.reason-grid{grid-template-columns:1fr;gap:14px}}

/* ===== 間取り図 ===== */
.madori-wrap{display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap}
.madori-img{flex:1;min-width:240px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--light);box-shadow:0 4px 20px rgba(0,0,0,0.06)}
.madori-img img{width:100%;display:block}
.madori-info{flex:1;min-width:200px}
.madori-spec{font-size:22px;font-weight:600;letter-spacing:0.04em;margin-bottom:14px;color:var(--dark)}
.madori-desc{font-size:14px;line-height:1.95;color:#444}

/* ===== ギャラリー ===== */
#gallery-section{max-width:100%;padding:56px 24px}
#gallery-section .inner{max-width:900px;margin:0 auto}
.slider-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:#111;user-select:none;box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.slider-track{display:flex;height:100%;transition:transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94)}
.slider-slide{flex:0 0 100%;height:100%;position:relative}
.slider-slide img{width:100%;height:100%;object-fit:cover;display:block}
.slider-cap{position:absolute;bottom:0;left:0;right:0;padding:20px 24px 18px;background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);color:#fff;pointer-events:none}
.slider-label{font-size:12px;color:rgba(255,255,255,0.85);letter-spacing:0.14em}
.slider-btn{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,0.6);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,0.5);color:#111;font-size:20px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;padding:0;transition:all 0.25s}
.slider-btn:hover{background:rgba(255,255,255,0.92);transform:translateY(-50%) scale(1.08)}
.slider-btn.prev{left:14px}
.slider-btn.next{right:14px}
.slider-dots{display:flex;justify-content:center;gap:7px;margin-top:14px}
.slider-dot{width:6px;height:6px;border-radius:50%;background:var(--border);border:none;cursor:pointer;padding:0;transition:all 0.25s}
.slider-dot.active{background:var(--dark);transform:scale(1.4)}

/* ===== 交通アクセス ===== */
.access-intro{font-size:15px;line-height:1.95;color:#444;margin-bottom:20px;padding:18px 20px;background:var(--light);border-radius:8px;border-left:3px solid var(--green)}
.access-list{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.access-list li{display:flex;align-items:center;gap:14px;font-size:14px;padding:14px 18px;background:var(--light);border-radius:8px;border:1px solid var(--border)}
.access-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.access-list li strong{font-weight:700;color:var(--dark);min-width:120px}
.map-container{width:100%;aspect-ratio:4/3;border-radius:10px;overflow:hidden;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.06)}
.map-container iframe{width:100%;height:100%;border:0;display:block}

/* ===== リノベ・設備 ===== */
.reno-hero{background:linear-gradient(135deg,var(--dark),var(--dark2));border-radius:12px;padding:28px 32px;margin-bottom:24px;color:#fff;position:relative;overflow:hidden}
.reno-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.reno-hero-text{font-size:18px;font-weight:300;letter-spacing:0.06em;line-height:1.8;color:#fff}
.reno-hero-text em{color:var(--green);font-style:normal;font-weight:600}
.equip-list{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.equip-item{font-size:13px;padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);display:flex;align-items:center;gap:10px;background:#fff}
.equip-item:nth-child(odd){border-right:1px solid var(--border)}
.equip-item::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
@media(max-width:600px){.equip-list{grid-template-columns:1fr}.equip-item:nth-child(odd){border-right:none}}

/* ===== 物件概要 ===== */
.spec-table{width:100%;border-collapse:collapse;table-layout:fixed;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.spec-table tr{border-bottom:1px solid var(--border)}
.spec-table tr:last-child{border-bottom:none}
.spec-table td{padding:13px 16px;font-size:14px;vertical-align:top;line-height:1.65}
.spec-table td:first-child{font-weight:700;color:#555;width:32%;background:var(--light);white-space:nowrap}
.spec-highlight{font-size:20px;font-weight:700;color:var(--dark)}

/* ===== 費用シミュレーション ===== */
.cost-hero{background:linear-gradient(135deg,var(--dark),var(--dark2));border-radius:14px;padding:32px;color:#fff;margin-bottom:18px;text-align:center;position:relative;overflow:hidden}
.cost-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.cost-hero-label{font-size:12px;color:var(--green);letter-spacing:0.14em;margin-bottom:10px;font-family:'Cormorant Garamond',serif;font-style:italic}
.cost-hero-value{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,9vw,60px);font-weight:300;line-height:1}
.cost-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.cost-card{background:var(--light);border-radius:10px;padding:18px;border:1px solid var(--border)}
.cost-card-label{font-size:12px;color:var(--gray);margin-bottom:6px;letter-spacing:0.06em}
.cost-card-value{font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--dark)}
.chart-wrap{background:var(--light);border-radius:10px;padding:22px;border:1px solid var(--border)}
.chart-title{font-size:13px;color:var(--gray);margin-bottom:16px;letter-spacing:0.06em}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.bar-label{font-size:12px;color:var(--text);width:56px;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;width:0%;transition:width 1.6s cubic-bezier(0.4,0,0.2,1)}
.bar-val{font-size:12px;color:var(--gray);width:80px;text-align:right;flex-shrink:0}
.cost-note{font-size:12px;color:var(--gray);line-height:1.85;padding:14px;background:var(--light);border-radius:8px;border:1px solid var(--border);margin-top:14px}
@media(max-width:600px){.cost-grid{grid-template-columns:1fr}}

/* ===== エリア ===== */
.area-block{margin-bottom:28px}
.area-block-title{font-size:15px;font-weight:700;margin-bottom:10px;padding-left:12px;border-left:3px solid var(--dark);color:var(--dark)}
.area-text{font-size:14px;line-height:1.95;color:#444}

/* ===== 周辺施設 ===== */
.facility-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.facility-cat{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:0.14em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.facility-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.facility-list li{font-size:13px;line-height:1.65;display:flex;align-items:baseline;gap:8px;color:#444}
.facility-list li::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:8px}
@media(max-width:600px){.facility-grid{grid-template-columns:1fr}}

/* ===== スポット ===== */
.spot-card{background:var(--light);border-radius:10px;padding:22px;margin-bottom:14px;border:1px solid var(--border)}
.spot-name{font-size:15px;font-weight:700;margin-bottom:8px;letter-spacing:0.04em;color:var(--dark)}
.spot-desc{font-size:13px;line-height:1.95;color:#444}

/* ===== CTA ===== */
#cta-section{background:linear-gradient(135deg,var(--dark),var(--dark2));border-top:none}
#cta-section .section{max-width:680px;text-align:center;padding:72px 24px}
.cta-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--green);letter-spacing:0.3em;margin-bottom:14px}
.cta-title{font-size:clamp(22px,4vw,32px);font-weight:600;color:#fff;letter-spacing:0.05em;margin-bottom:12px;line-height:1.4}
.cta-sub{font-size:14px;color:rgba(255,255,255,0.6);line-height:1.85;margin-bottom:40px}
.cta-btn{display:inline-flex;flex-direction:column;align-items:center;gap:4px;background:var(--gold);color:var(--dark);border-radius:60px;padding:20px 48px;text-decoration:none;transition:all 0.3s;box-shadow:0 8px 32px rgba(200,184,154,0.3)}
.cta-btn:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 12px 40px rgba(200,184,154,0.4)}
.cta-btn-label{font-size:11px;letter-spacing:0.2em;font-weight:600}
.cta-btn-tel{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,6vw,40px);font-weight:600;letter-spacing:0.08em;line-height:1.1}
.cta-btn-sub{font-size:11px;letter-spacing:0.12em;opacity:0.7}
.cta-note{font-size:12px;color:rgba(255,255,255,0.4);margin-top:20px;letter-spacing:0.06em}

/* ===== フッター ===== */
.footer{background:#111;color:#fff;padding:40px 24px;text-align:center}
.footer-company{font-size:15px;font-weight:600;letter-spacing:0.14em;margin-bottom:6px}
.footer-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--green);letter-spacing:0.22em;margin-bottom:20px}
.footer-note{font-size:11px;color:#666;line-height:1.95;max-width:560px;margin:0 auto}

/* ===== 固定CTAバー（モバイル） ===== */
#fixed-cta{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--gold);z-index:200;padding:12px 20px;align-items:center;justify-content:center;gap:10px;box-shadow:0 -4px 20px rgba(0,0,0,0.15)}
#fixed-cta a{color:var(--dark);text-decoration:none;font-weight:700;font-size:16px;letter-spacing:0.06em;display:flex;align-items:center;gap:8px}
@media(max-width:640px){#fixed-cta{display:flex}body{padding-bottom:60px}}
</style>
</head>
<body>

<div id="site-header">
  <div class="header-company">Tokyo Mansion Co., Ltd.</div>
  <div class="header-title" id="header-title">物件資料</div>
  <a class="header-tel" href="tel:0337897777">📞 03-3789-7777</a>
</div>

<div id="loading">
  <div class="loading-row">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
  <div class="loading-text">読み込み中…</div>
</div>

<div id="error-msg">
  <div style="font-size:36px">🏠</div>
  <div>物件データが見つかりませんでした</div>
</div>

<div id="content"></div>

<!-- 固定CTAバー（モバイル用） -->
<div id="fixed-cta">
  <a href="tel:0337897777">📞 お問い合わせ・内見予約：03-3789-7777</a>
</div>

<script src="js/lp-render.js"></script>
<script>
var SUPABASE_URL='https://bypticegujbxgvcctkju.supabase.co';
var SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5cHRpY2VndWpieGd2Y2N0a2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NzA3OTUsImV4cCI6MjA5NzA0Njc5NX0.4fzXRVUYKzkDDmOzEiq3PP0Wk8ZujdD7AJAYivnWgbc';
var TABLE_PROPERTIES='tkms-mansion-properties';

async function load(){
  var id=new URLSearchParams(location.search).get('id');
  if(!id){showError();return;}
  try{
    var r=await fetch(SUPABASE_URL+'/rest/v1/'+TABLE_PROPERTIES+'?id=eq.'+id+'&select=*',{
      headers:{'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON}
    });
    var data=await r.json();
    if(!data||!data[0]){showError();return;}
    var prop=data[0];
    document.title=(prop.name||'物件資料')+' — 東京マンション株式会社';
    document.getElementById('header-title').textContent=prop.name||'物件資料';
    var html='';
    if(prop.property_data&&prop.property_data.info){
      html=LPRender.renderProperty(prop.property_data);
    } else if(prop.html_content){
      html=prop.html_content;
    } else {
      showError(); return;
    }
    document.getElementById('content').innerHTML=html;
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    setTimeout(initAll,60);
  }catch(e){console.error(e);showError();}
}

function showError(){
  document.getElementById('loading').style.display='none';
  document.getElementById('error-msg').style.display='flex';
}

function initAll(){
  initFadeIn();
  initSlider();
  initCostObserver();
}

function initFadeIn(){
  var els=document.querySelectorAll('.fade-in');
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
  },{threshold:0.08});
  els.forEach(function(el){obs.observe(el);});
}

function initCostObserver(){
  var s=document.getElementById('cost-section');
  if(!s)return;
  var obs=new IntersectionObserver(function(entries){
    if(entries[0].isIntersecting){obs.disconnect();setTimeout(animateCost,300);}
  },{threshold:0.15});
  obs.observe(s);
}

function animateCost(){
  document.querySelectorAll('[data-cu]').forEach(function(el){
    var target=parseInt(el.getAttribute('data-cu'));
    var sf=el.getAttribute('data-sf')||'';
    var s=0,dur=1600,step=16;
    var tm=setInterval(function(){
      s+=target/(dur/step);
      if(s>=target){s=target;clearInterval(tm);}
      el.textContent=Math.floor(s).toLocaleString()+sf;
    },step);
  });
  document.querySelectorAll('.bar-fill').forEach(function(el){
    setTimeout(function(){el.style.width=el.getAttribute('data-w')+'%';},400);
  });
}

function initSlider(){
  var section=document.getElementById('gallery-section');
  if(!section)return;
  var wrap=section.querySelector('.slider-wrap');
  if(wrap){setupSlider(wrap);return;}

  var items=[];
  section.querySelectorAll('img').forEach(function(img){
    if(!img.src||img.src===window.location.href)return;
    var card=img.closest('[class]');
    var label='';
    if(card){var lel=card.querySelector('.slider-label,.gallery-label,.photo-label');if(lel)label=lel.textContent.trim();}
    items.push({src:img.src,label:label});
  });
  if(!items.length)return;

  var wrap=document.createElement('div');
  wrap.className='slider-wrap';
  var track=document.createElement('div');
  track.className='slider-track';
  items.forEach(function(item){
    var slide=document.createElement('div');
    slide.className='slider-slide';
    var img=document.createElement('img');
    img.src=item.src;img.alt=item.label;img.loading='lazy';
    slide.appendChild(img);
    if(item.label){
      var cap=document.createElement('div');
      cap.className='slider-cap';
      cap.innerHTML='<div class="slider-label">'+item.label+'</div>';
      slide.appendChild(cap);
    }
    track.appendChild(slide);
  });
  wrap.appendChild(track);

  var pb=document.createElement('button');pb.className='slider-btn prev';pb.innerHTML='&#8592;';
  var nb=document.createElement('button');nb.className='slider-btn next';nb.innerHTML='&#8594;';
  wrap.appendChild(pb);wrap.appendChild(nb);

  var dots=document.createElement('div');dots.className='slider-dots';
  items.forEach(function(_,i){var d=document.createElement('button');d.className='slider-dot'+(i===0?' active':'');dots.appendChild(d);});

  var inner=section.querySelector('.inner')||section;
  Array.from(inner.children).forEach(function(el){
    if(!el.classList.contains('section-eyebrow')&&!el.classList.contains('section-title'))el.remove();
  });
  inner.appendChild(wrap);
  inner.appendChild(dots);
  setupSlider(wrap);
}

function setupSlider(wrap){
  var track=wrap.querySelector('.slider-track');
  var slides=wrap.querySelectorAll('.slider-slide');
  var section=wrap.closest('.section,.section-full')||wrap.parentElement.parentElement;
  var dots=section?section.querySelectorAll('.slider-dot'):[];
  var pb=wrap.querySelector('.slider-btn.prev');
  var nb=wrap.querySelector('.slider-btn.next');
  if(!track||!slides.length)return;
  var cur=0,startX=0,dragging=false;
  function go(n){
    cur=(n+slides.length)%slides.length;
    track.style.transform='translateX(-'+(cur*100)+'%)';
    dots.forEach(function(d,i){d.classList.toggle('active',i===cur);});
  }
  if(slides.length<=1){if(pb)pb.style.display='none';if(nb)nb.style.display='none';}
  if(pb)pb.addEventListener('click',function(){go(cur-1);});
  if(nb)nb.addEventListener('click',function(){go(cur+1);});
  dots.forEach(function(d,i){d.addEventListener('click',function(){go(i);});});
  wrap.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;dragging=true;},{passive:true});
  wrap.addEventListener('touchend',function(e){
    if(!dragging)return;dragging=false;
    var diff=startX-e.changedTouches[0].clientX;
    if(Math.abs(diff)>40)go(diff>0?cur+1:cur-1);
  });
  wrap.addEventListener('mousedown',function(e){startX=e.clientX;dragging=true;});
  wrap.addEventListener('mouseup',function(e){
    if(!dragging)return;dragging=false;
    var diff=startX-e.clientX;
    if(Math.abs(diff)>40)go(diff>0?cur+1:cur-1);
  });
  go(0);
}

load();
</script>
