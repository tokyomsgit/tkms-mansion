<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物件資料</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#162221;
  --dark2:#1c2b2a;
  --green:#7eb8a0;
  --green-dim:#5a9a82;
  --gold:#c8b89a;
  --gold2:#e8d8bc;
  --text:#1a1a1a;
  --gray:#7a7a7a;
  --light:#f4f2ec;
  --border:#e5e1d8;
  --white:#ffffff;
  --shadow:0 12px 40px rgba(22,34,33,0.08);
}
body{background:#faf9f6;font-family:'Noto Serif JP','游明朝',serif;color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased}

/* ===== ヘッダー ===== */
#site-header{position:sticky;top:0;z-index:100;background:rgba(22,34,33,0.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(126,184,160,0.18);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between}
.header-company{font-size:10px;color:var(--green);letter-spacing:0.22em;font-family:'Cormorant Garamond',serif;font-style:italic;text-transform:uppercase}
.header-title{font-size:13px;font-weight:600;letter-spacing:0.08em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%}
.header-tel{font-size:12px;font-weight:600;color:var(--gold);letter-spacing:0.12em;text-decoration:none;border:1px solid rgba(200,184,154,0.35);padding:6px 14px;border-radius:20px;transition:all 0.25s}
.header-tel:hover{color:var(--gold2);border-color:var(--gold);background:rgba(200,184,154,0.08)}

/* ===== ローディング ===== */
#loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--dark)}
.loading-row{display:flex;gap:8px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:ld 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:0.2s}
.loading-dot:nth-child(3){animation-delay:0.4s}
@keyframes ld{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
.loading-text{font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:0.14em}
#error-msg{display:none;min-height:80vh;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--gray);font-size:14px}
#content{display:none}

/* ===== アニメーション ===== */
.fade-in{opacity:0;transform:translateY(24px);transition:opacity 0.7s ease,transform 0.7s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* ===== ヒーロー ===== */
.hero{color:#fff;padding:0;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 100%);background-size:cover;background-position:center;min-height:440px;display:flex;align-items:flex-end}
.hero-inner{width:100%;max-width:880px;margin:0 auto;padding:72px 28px 56px;position:relative;z-index:1}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(22,34,33,0.15),transparent 40%);pointer-events:none}
.hero-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--green);letter-spacing:0.35em;margin-bottom:8px;text-transform:uppercase}
.hero-company{font-size:11px;color:rgba(255,255,255,0.55);letter-spacing:0.18em;margin-bottom:24px}
.hero-name{font-size:clamp(28px,5.5vw,48px);font-weight:600;letter-spacing:0.06em;line-height:1.25;margin-bottom:12px;text-shadow:0 2px 24px rgba(0,0,0,0.25)}
.hero-room{font-size:14px;color:rgba(126,184,160,0.95);letter-spacing:0.16em;font-weight:300;margin-bottom:36px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hero-sep{opacity:0.4;font-weight:300}
.hero-price-wrap{margin-bottom:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.12)}
.hero-price-label{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.2em;margin-bottom:8px;text-transform:uppercase;font-family:'Cormorant Garamond',serif;font-style:italic}
.hero-price{font-family:'Cormorant Garamond',serif;font-size:clamp(44px,10vw,80px);font-weight:300;color:#fff;letter-spacing:0.02em;line-height:1}
.hero-price-suffix{font-size:clamp(16px,2.5vw,26px);font-weight:300;margin-left:6px;opacity:0.85}
.hero-tags{display:flex;flex-wrap:wrap;gap:8px}
.hero-tag-item{background:rgba(255,255,255,0.08);border:1px solid rgba(126,184,160,0.3);border-radius:24px;padding:7px 16px;font-size:11px;color:var(--green);letter-spacing:0.08em;backdrop-filter:blur(4px)}

/* ===== セクション共通 ===== */
.section{padding:64px 28px;max-width:840px;margin:0 auto}
.section-full{padding:0;max-width:100%;margin:0}
.section-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--green-dim);letter-spacing:0.32em;margin-bottom:10px;text-transform:uppercase}
.section-title{font-size:clamp(20px,3vw,26px);font-weight:700;letter-spacing:0.08em;margin-bottom:32px;color:var(--dark);position:relative;padding-bottom:14px}
.section-title::after{content:'';position:absolute;bottom:0;left:0;width:48px;height:2px;background:linear-gradient(90deg,var(--green),transparent);border-radius:1px}

/* ===== メインビジュアル ===== */
#visual-section{padding:48px 28px 0;background:#faf9f6}
.visual-wrap{display:grid;grid-template-columns:1.6fr 1fr;gap:4px;height:460px;max-width:960px;margin:0 auto;border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.visual-main{position:relative;overflow:hidden;background:var(--dark)}
.visual-main img,.visual-sub-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 1s ease}
.visual-main:hover img,.visual-sub-img:hover img{transform:scale(1.04)}
.visual-sub{display:flex;flex-direction:column;gap:4px}
.visual-sub-img{flex:1;position:relative;overflow:hidden;background:var(--dark)}
.visual-label{position:absolute;bottom:12px;left:14px;font-size:10px;color:#fff;letter-spacing:0.14em;background:rgba(22,34,33,0.55);padding:4px 12px;border-radius:20px;backdrop-filter:blur(6px)}
@media(max-width:640px){
  .visual-wrap{grid-template-columns:1fr;height:auto;border-radius:12px}
  .visual-main{aspect-ratio:4/3}
  .visual-sub{flex-direction:row;height:130px}
  #visual-section{padding:32px 16px 0}
}

/* ===== 選ぶ理由 ===== */
#reason-section{background:var(--dark);margin-top:48px}
#reason-section .section{max-width:900px;padding:64px 28px}
.reason-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.reason-card{text-align:center;padding:36px 22px;border:1px solid rgba(126,184,160,0.15);border-radius:16px;background:rgba(255,255,255,0.03);transition:border-color 0.3s,transform 0.3s,box-shadow 0.3s}
.reason-card:hover{border-color:rgba(126,184,160,0.45);transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,0.2)}
.reason-icon{margin-bottom:16px;display:flex;justify-content:center}
.reason-icon-badge{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;border:1px solid rgba(126,184,160,0.4);color:var(--green);font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;background:rgba(126,184,160,0.06)}
.reason-label{font-size:10px;color:var(--green);letter-spacing:0.24em;margin-bottom:10px;font-family:'Cormorant Garamond',serif;font-style:italic;text-transform:uppercase}
.reason-title{font-size:16px;font-weight:600;color:#fff;letter-spacing:0.06em;margin-bottom:10px}
.reason-desc{font-size:13px;color:rgba(255,255,255,0.58);line-height:1.85}
@media(max-width:640px){.reason-grid{grid-template-columns:1fr;gap:14px}}

/* ===== 間取り ===== */
.madori-wrap{display:flex;gap:32px;align-items:flex-start;flex-wrap:wrap}
.madori-img{flex:1;min-width:260px;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:#fff;box-shadow:var(--shadow)}
.madori-img img{width:100%;display:block}
.madori-info{flex:1;min-width:220px;padding-top:8px}
.madori-spec{font-size:21px;font-weight:600;letter-spacing:0.06em;margin-bottom:16px;color:var(--dark)}
.madori-desc{font-size:14px;line-height:2;color:#555}

/* ===== ギャラリー ===== */
#gallery-section{max-width:100%;padding:64px 28px;background:#fff}
#gallery-section .inner{max-width:920px;margin:0 auto}
.slider-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;background:#111;user-select:none;box-shadow:var(--shadow)}
.slider-track{display:flex;height:100%;transition:transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94)}
.slider-slide{flex:0 0 100%;height:100%;position:relative}
.slider-slide img{width:100%;height:100%;object-fit:cover;display:block}
.slider-cap{position:absolute;bottom:0;left:0;right:0;padding:24px 28px 20px;background:linear-gradient(to top,rgba(22,34,33,0.7),transparent);color:#fff;pointer-events:none}
.slider-label{font-size:11px;color:rgba(255,255,255,0.9);letter-spacing:0.18em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;font-style:italic}
.slider-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.75);backdrop-filter:blur(8px);border:none;color:var(--dark);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;padding:0;transition:all 0.25s;box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.slider-btn:hover{background:#fff;transform:translateY(-50%) scale(1.06)}
.slider-btn.prev{left:16px}
.slider-btn.next{right:16px}

/* ===== 交通 ===== */
.access-intro{font-size:15px;line-height:1.95;color:#444;margin-bottom:24px;padding:20px 22px;background:var(--light);border-radius:12px;border-left:3px solid var(--green)}
.access-list{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.access-list li{display:flex;align-items:center;gap:14px;font-size:14px;padding:16px 20px;background:#fff;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.03)}
.access-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 0 3px rgba(126,184,160,0.2)}
.access-list li strong{font-weight:700;color:var(--dark);min-width:120px}
.map-container{width:100%;aspect-ratio:16/10;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow)}
.map-container iframe{width:100%;height:100%;border:0;display:block}

/* ===== リノベ ===== */
.reno-hero{background:linear-gradient(135deg,var(--dark),var(--dark2));border-radius:16px;padding:32px 36px;margin-bottom:28px;color:#fff}
.reno-hero-text{font-size:17px;font-weight:300;letter-spacing:0.06em;line-height:1.85}
.reno-hero-text em{color:var(--green);font-style:normal;font-weight:600}
.equip-list{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.equip-item{font-size:13px;padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.equip-item:nth-child(odd){border-right:1px solid var(--border)}
.equip-item::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);flex-shrink:0}
@media(max-width:600px){.equip-list{grid-template-columns:1fr}.equip-item:nth-child(odd){border-right:none}}

/* ===== 物件概要 ===== */
.spec-table{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.spec-table tr{border-bottom:1px solid var(--border)}
.spec-table tr:last-child{border-bottom:none}
.spec-table td{padding:15px 18px;font-size:14px;vertical-align:top;line-height:1.7}
.spec-table td:first-child{font-weight:600;color:var(--gray);width:30%;background:var(--light);font-size:12px;letter-spacing:0.06em;white-space:nowrap}
.spec-highlight{font-size:22px;font-weight:700;color:var(--dark);font-family:'Cormorant Garamond',serif}

/* ===== 費用 ===== */
.cost-hero{background:linear-gradient(135deg,var(--dark),var(--dark2));border-radius:16px;padding:36px;color:#fff;margin-bottom:20px;text-align:center}
.cost-hero-label{font-size:11px;color:var(--green);letter-spacing:0.18em;margin-bottom:12px;font-family:'Cormorant Garamond',serif;font-style:italic;text-transform:uppercase}
.cost-hero-value{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,9vw,64px);font-weight:300;line-height:1}
.cost-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.cost-card{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--border)}
.cost-card-label{font-size:11px;color:var(--gray);margin-bottom:8px;letter-spacing:0.08em}
.cost-card-value{font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--dark)}
.chart-wrap{background:#fff;border-radius:12px;padding:24px;border:1px solid var(--border)}
.chart-title{font-size:12px;color:var(--gray);margin-bottom:18px;letter-spacing:0.06em}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.bar-label{font-size:12px;width:56px;flex-shrink:0}
.bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;width:0%;transition:width 1.6s cubic-bezier(0.4,0,0.2,1)}
.bar-val{font-size:12px;color:var(--gray);width:80px;text-align:right;flex-shrink:0}
.cost-note{font-size:12px;color:var(--gray);line-height:1.85;padding:16px;background:var(--light);border-radius:10px;margin-top:16px}
@media(max-width:600px){.cost-grid{grid-template-columns:1fr}}

/* ===== エリア・施設・スポット ===== */
.area-block{margin-bottom:32px;padding:24px;background:#fff;border-radius:12px;border:1px solid var(--border)}
.area-block-title{font-size:14px;font-weight:700;margin-bottom:12px;padding-left:14px;border-left:3px solid var(--dark);color:var(--dark);letter-spacing:0.06em}
.area-text{font-size:14px;line-height:2;color:#555}
.facility-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.facility-cat{font-size:10px;font-weight:700;color:var(--gray);letter-spacing:0.16em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);text-transform:uppercase}
.facility-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.facility-list li{font-size:13px;line-height:1.7;color:#555;display:flex;align-items:baseline;gap:8px}
.facility-list li::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);flex-shrink:0}
@media(max-width:600px){.facility-grid{grid-template-columns:1fr}}
.spot-card{background:#fff;border-radius:12px;padding:24px;margin-bottom:14px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.03)}
.spot-name{font-size:15px;font-weight:700;margin-bottom:8px;letter-spacing:0.04em;color:var(--dark)}
.spot-desc{font-size:13px;line-height:1.95;color:#555}

/* ===== CTA ===== */
#cta-section{background:var(--dark);margin-top:32px}
#cta-section .section{max-width:680px;text-align:center;padding:80px 28px}
.cta-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--green);letter-spacing:0.32em;margin-bottom:16px;text-transform:uppercase}
.cta-title{font-size:clamp(22px,4vw,30px);font-weight:600;color:#fff;letter-spacing:0.06em;margin-bottom:14px;line-height:1.45}
.cta-sub{font-size:14px;color:rgba(255,255,255,0.55);line-height:1.85;margin-bottom:40px}
.cta-btn{display:inline-flex;flex-direction:column;align-items:center;gap:4px;background:var(--gold);color:var(--dark);border-radius:60px;padding:22px 52px;text-decoration:none;transition:all 0.3s;box-shadow:0 8px 32px rgba(200,184,154,0.25)}
.cta-btn:hover{background:var(--gold2);transform:translateY(-3px);box-shadow:0 14px 40px rgba(200,184,154,0.35)}
.cta-btn-label{font-size:10px;letter-spacing:0.22em;font-weight:600}
.cta-btn-tel{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,6vw,38px);font-weight:600;letter-spacing:0.08em;line-height:1.1}
.cta-btn-sub{font-size:11px;letter-spacing:0.1em;opacity:0.65}
.cta-note{font-size:12px;color:rgba(255,255,255,0.35);margin-top:24px}

/* ===== フッター ===== */
.footer{background:var(--dark);color:#fff;padding:48px 28px;text-align:center;border-top:1px solid rgba(126,184,160,0.15)}
.footer-company{font-size:14px;font-weight:600;letter-spacing:0.16em;margin-bottom:6px}
.footer-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--green);letter-spacing:0.24em;margin-bottom:20px}
.footer-note{font-size:11px;color:rgba(255,255,255,0.35);line-height:1.95;max-width:560px;margin:0 auto}

/* ===== 固定CTA ===== */
#fixed-cta{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--gold);z-index:200;padding:14px 20px;justify-content:center;box-shadow:0 -4px 24px rgba(0,0,0,0.12)}
#fixed-cta a{color:var(--dark);text-decoration:none;font-weight:700;font-size:15px;letter-spacing:0.06em}
@media(max-width:640px){#fixed-cta{display:flex}body{padding-bottom:58px}}
</style>
</head>
<body>

<div id="site-header">
  <div class="header-company">Tokyo Mansion Co., Ltd.</div>
  <div class="header-title" id="header-title">物件資料</div>
  <a class="header-tel" href="tel:0337897777">TEL 03-3789-7777</a>
</div>

<div id="loading">
  <div class="loading-row">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
  <div class="loading-text">読み込み中…</div>
</div>

<div id="error-msg">
  <div style="font-size:36px">🏠</div>
  <div>物件データが見つかりませんでした</div>
</div>

<div id="content"></div>

<!-- 固定CTAバー（モバイル用） -->
<div id="fixed-cta">
  <a href="tel:0337897777">📞 お問い合わせ・内見予約：03-3789-7777</a>
</div>

<script src="js/lp-render.js"></script>
<script>
var SUPABASE_URL='https://bypticegujbxgvcctkju.supabase.co';
var SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5cHRpY2VndWpieGd2Y2N0a2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NzA3OTUsImV4cCI6MjA5NzA0Njc5NX0.4fzXRVUYKzkDDmOzEiq3PP0Wk8ZujdD7AJAYivnWgbc';
var TABLE_PROPERTIES='tkms-mansion-properties';

async function load(){
  var id=new URLSearchParams(location.search).get('id');
  if(!id){showError();return;}
  try{
    var r=await fetch(SUPABASE_URL+'/rest/v1/'+TABLE_PROPERTIES+'?id=eq.'+id+'&select=*',{
      headers:{'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON}
    });
    var data=await r.json();
    if(!data||!data[0]){showError();return;}
    var prop=data[0];
    document.title=(prop.name||'物件資料')+' — 東京マンション株式会社';
    var displayName=prop.name||'物件資料';
    if(window.LPRender&&LPRender.cleanDisplayName) displayName=LPRender.cleanDisplayName(displayName);
    document.getElementById('header-title').textContent=displayName;
    var html='';
    if(prop.property_data&&prop.property_data.info){
      html=LPRender.renderProperty(prop.property_data);
    } else if(prop.html_content){
      html=prop.html_content;
    } else {
      showError(); return;
    }
    document.getElementById('content').innerHTML=html;
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    setTimeout(initAll,60);
  }catch(e){console.error(e);showError();}
}

function showError(){
  document.getElementById('loading').style.display='none';
  document.getElementById('error-msg').style.display='flex';
}

function initAll(){
  initFadeIn();
  initSlider();
  initCostObserver();
}

function initFadeIn(){
  var els=document.querySelectorAll('.fade-in');
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
  },{threshold:0.08});
  els.forEach(function(el){obs.observe(el);});
}

function initCostObserver(){
  var s=document.getElementById('cost-section');
  if(!s)return;
  var obs=new IntersectionObserver(function(entries){
    if(entries[0].isIntersecting){obs.disconnect();setTimeout(animateCost,300);}
  },{threshold:0.15});
  obs.observe(s);
}

function animateCost(){
  document.querySelectorAll('[data-cu]').forEach(function(el){
    var target=parseInt(el.getAttribute('data-cu'));
    var sf=el.getAttribute('data-sf')||'';
    var s=0,dur=1600,step=16;
    var tm=setInterval(function(){
      s+=target/(dur/step);
      if(s>=target){s=target;clearInterval(tm);}
      el.textContent=Math.floor(s).toLocaleString()+sf;
    },step);
  });
  document.querySelectorAll('.bar-fill').forEach(function(el){
    setTimeout(function(){el.style.width=el.getAttribute('data-w')+'%';},400);
  });
}

function initSlider(){
  var section=document.getElementById('gallery-section');
  if(!section)return;
  var wrap=section.querySelector('.slider-wrap');
  if(wrap){setupSlider(wrap);return;}

  var items=[];
  section.querySelectorAll('img').forEach(function(img){
    if(!img.src||img.src===window.location.href)return;
    var card=img.closest('[class]');
    var label='';
    if(card){var lel=card.querySelector('.slider-label,.gallery-label,.photo-label');if(lel)label=lel.textContent.trim();}
    items.push({src:img.src,label:label});
  });
  if(!items.length)return;

  var wrap=document.createElement('div');
  wrap.className='slider-wrap';
  var track=document.createElement('div');
  track.className='slider-track';
  items.forEach(function(item){
    var slide=document.createElement('div');
    slide.className='slider-slide';
    var img=document.createElement('img');
    img.src=item.src;img.alt=item.label;img.loading='lazy';
    slide.appendChild(img);
    if(item.label){
      var cap=document.createElement('div');
      cap.className='slider-cap';
      cap.innerHTML='<div class="slider-label">'+item.label+'</div>';
      slide.appendChild(cap);
    }
    track.appendChild(slide);
  });
  wrap.appendChild(track);

  var pb=document.createElement('button');pb.className='slider-btn prev';pb.innerHTML='&#8592;';
  var nb=document.createElement('button');nb.className='slider-btn next';nb.innerHTML='&#8594;';
  wrap.appendChild(pb);wrap.appendChild(nb);

  var dots=document.createElement('div');dots.className='slider-dots';
  items.forEach(function(_,i){var d=document.createElement('button');d.className='slider-dot'+(i===0?' active':'');dots.appendChild(d);});

  var inner=section.querySelector('.inner')||section;
  Array.from(inner.children).forEach(function(el){
    if(!el.classList.contains('section-eyebrow')&&!el.classList.contains('section-title'))el.remove();
  });
  inner.appendChild(wrap);
  inner.appendChild(dots);
  setupSlider(wrap);
}

function setupSlider(wrap){
  var track=wrap.querySelector('.slider-track');
  var slides=wrap.querySelectorAll('.slider-slide');
  var section=wrap.closest('.section,.section-full')||wrap.parentElement.parentElement;
  var dots=section?section.querySelectorAll('.slider-dot'):[];
  var pb=wrap.querySelector('.slider-btn.prev');
  var nb=wrap.querySelector('.slider-btn.next');
  if(!track||!slides.length)return;
  var cur=0,startX=0,dragging=false;
  function go(n){
    cur=(n+slides.length)%slides.length;
    track.style.transform='translateX(-'+(cur*100)+'%)';
    dots.forEach(function(d,i){d.classList.toggle('active',i===cur);});
  }
  if(slides.length<=1){if(pb)pb.style.display='none';if(nb)nb.style.display='none';}
  if(pb)pb.addEventListener('click',function(){go(cur-1);});
  if(nb)nb.addEventListener('click',function(){go(cur+1);});
  dots.forEach(function(d,i){d.addEventListener('click',function(){go(i);});});
  wrap.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;dragging=true;},{passive:true});
  wrap.addEventListener('touchend',function(e){
    if(!dragging)return;dragging=false;
    var diff=startX-e.changedTouches[0].clientX;
    if(Math.abs(diff)>40)go(diff>0?cur+1:cur-1);
  });
  wrap.addEventListener('mousedown',function(e){startX=e.clientX;dragging=true;});
  wrap.addEventListener('mouseup',function(e){
    if(!dragging)return;dragging=false;
    var diff=startX-e.clientX;
    if(Math.abs(diff)>40)go(diff>0?cur+1:cur-1);
  });
  go(0);
}

load();
</script>
